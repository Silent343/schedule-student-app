<article class="quiz" [style.--c]="style(quiz.subject).colorVar">
  <div class="quiz-top">
    <span class="subject-chip" [style.color]="style(quiz.subject).colorVar">
      {{ style(quiz.subject).labelKey | translate }}
    </span>
    <button class="quiz-menu" [matMenuTriggerFor]="menu" type="button" aria-label="Opciones">
      <span class="material-symbols-rounded">more_horiz</span>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item (click)="edit.emit(quiz)">
        <span class="material-symbols-rounded menu-ico">edit</span>{{ 'common.edit' | translate }}
      </button>
      <button mat-menu-item (click)="remove.emit(quiz)">
        <span class="material-symbols-rounded menu-ico">delete</span>{{ 'common.delete' | translate }}
      </button>
    </mat-menu>
  </div>

  <h3 class="quiz-title">{{ quiz.title }}</h3>
  <p class="quiz-meta">
    <span class="material-symbols-rounded">help</span>
    {{ 'assessment.card.questions' | translate: { count: quiz.questionCount } }}
  </p>

  <button class="quiz-start" type="button" (click)="start.emit(quiz)">
    {{ 'assessment.card.start' | translate }}
    <span class="material-symbols-rounded">arrow_forward</span>
  </button>
</article>
