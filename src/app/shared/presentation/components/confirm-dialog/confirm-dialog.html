<div class="confirm">
  <div class="confirm-icon"><span class="material-symbols-rounded">delete</span></div>
  <h2 class="confirm-title">{{ data.title }}</h2>
  <p class="confirm-message">{{ data.message }}</p>
  <div class="confirm-actions">
    <button mat-stroked-button (click)="cancel()">{{ data.cancelLabel ?? 'Cancelar' }}</button>
    <button mat-flat-button class="danger" (click)="confirm()">
      {{ data.confirmLabel ?? 'Eliminar' }}
    </button>
  </div>
</div>
