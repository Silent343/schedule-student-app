<article class="note">
  <button class="note-image" type="button" (click)="preview.emit(note)"
          [attr.aria-label]="'board.preview' | translate">
    <img [src]="note.imageUrl" [alt]="note.title" loading="lazy" />
    <span class="note-zoom"><span class="material-symbols-rounded">zoom_in</span></span>
  </button>

  <div class="note-body">
    <div class="note-top">
      <span class="subject-chip" [style.color]="style(note.subject).colorVar">
        {{ style(note.subject).labelKey | translate }}
      </span>
      <button class="note-menu" [matMenuTriggerFor]="menu" type="button"
              [attr.aria-label]="'common.options' | translate">
        <span class="material-symbols-rounded">more_horiz</span>
      </button>
      <mat-menu #menu="matMenu">
        <button mat-menu-item (click)="edit.emit(note)">
          <span class="material-symbols-rounded menu-ico">edit</span>{{ 'common.edit' | translate }}
        </button>
        <button mat-menu-item (click)="remove.emit(note)">
          <span class="material-symbols-rounded menu-ico">delete</span>{{ 'common.delete' | translate }}
        </button>
      </mat-menu>
    </div>
    <h3 class="note-title">{{ note.title }}</h3>
  </div>
</article>
